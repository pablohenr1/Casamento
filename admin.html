<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controlo - Convidados</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #7A2E39; text-align: center; }
        
        /* Cartões de Resumo */
        .resumo-grid { display: flex; gap: 20px; margin-bottom: 30px; justify-content: space-between; }
        .card-resumo { flex: 1; padding: 20px; text-align: center; border-radius: 8px; color: white; font-weight: bold; }
        .bg-total { background-color: #4A90E2; }
        .bg-confirmados { background-color: #27AE60; }
        .bg-pendentes { background-color: #F39C12; }
        .bg-recusados { background-color: #E74C3C; }
        .card-resumo h3 { margin: 0; font-size: 1.2rem; }
        .card-resumo p { margin: 10px 0 0; font-size: 2.5rem; }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #7A2E39; color: white; }
        tr:hover { background-color: #f1f1f1; }
        .status-confirmado { color: #27AE60; font-weight: bold; }
        .status-pendente { color: #F39C12; font-weight: bold; }
        .status-recusado { color: #E74C3C; font-weight: bold; }

        /* Botão Exportar */
        .btn-exportar { display: block; width: 250px; margin: 0 auto 20px auto; background-color: #27AE60; color: white; padding: 15px; text-align: center; text-decoration: none; font-size: 1.1rem; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; }
        .btn-exportar:hover { background-color: #219653; }
    </style>
</head>
<body>

<div class="container">
    <h1>Lista de Convidados - RSVP</h1>
    
    <button id="btn-exportar" class="btn-exportar">📥 Exportar para Excel (CSV)</button>

    <div class="resumo-grid">
        <div class="card-resumo bg-total">
            <h3>Total na Lista</h3>
            <p id="total-convidados">0</p>
        </div>
        <div class="card-resumo bg-confirmados">
            <h3>Confirmados (Pessoas)</h3>
            <p id="total-confirmados">0</p>
        </div>
        <div class="card-resumo bg-pendentes">
            <h3>Pendentes (Famílias)</h3>
            <p id="total-pendentes">0</p>
        </div>
        <div class="card-resumo bg-recusados">
            <h3>Não Vão (Pessoas)</h3>
            <p id="total-recusados">0</p>
        </div>
    </div>

    <table id="tabela-convidados">
        <thead>
            <tr>
                <th>Titular (Família)</th>
                <th>Membro da Família</th>
                <th>Status do Grupo</th>
                <th>Presença Individual</th>
                <th>Mensagem</th>
            </tr>
        </thead>
        <tbody>
            <tr><td colspan="5" style="text-align: center;">A carregar dados da base de dados...</td></tr>
        </tbody>
    </table>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyClI9Lg4IXjHtwZetZxgKdv55sSF-jRSg8",
        authDomain: "casamento-kathleenpablo.firebaseapp.com",
        projectId: "casamento-kathleenpablo",
        storageBucket: "casamento-kathleenpablo.firebasestorage.app",
        messagingSenderId: "82624101006",
        appId: "1:82624101006:web:7a19f6917d697cbeeea7df",
        measurementId: "G-TNSD3ZBS2C"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let dadosExportacao = [];

    async function carregarConvidados() {
        try {
            const querySnapshot = await getDocs(collection(db, "convidados"));
            const tbody = document.querySelector("#tabela-convidados tbody");
            tbody.innerHTML = ""; 

            let contagemTotal = 0;
            let contagemConfirmados = 0;
            let contagemPendentesFamilias = 0;
            let contagemRecusados = 0;

            querySnapshot.forEach((doc) => {
                const dados = doc.data();
                const titular = dados.membros[0].nome;
                const statusGrupo = dados.status_convite || "pendente";
                const mensagem = dados.mensagem_noivos || "";

                if(statusGrupo === "pendente") contagemPendentesFamilias++;

                dados.membros.forEach((membro) => {
                    contagemTotal++;
                    
                    // Lógica de contagem
                    let statusIndividual = "Pendente";
                    let classeCor = "status-pendente";

                    if (statusGrupo === "confirmado") {
                        if (membro.confirmado) {
                            statusIndividual = "Vai";
                            classeCor = "status-confirmado";
                            contagemConfirmados++;
                        } else {
                            statusIndividual = "Não Vai";
                            classeCor = "status-recusado";
                            contagemRecusados++;
                        }
                    } else if (statusGrupo === "recusado") {
                        statusIndividual = "Não Vai";
                        classeCor = "status-recusado";
                        contagemRecusados++;
                    }

                    // Guarda para o Excel
                    dadosExportacao.push([titular, membro.nome, statusGrupo, statusIndividual, mensagem.replace(/\n/g, " ")]);

                    // Adiciona à Tabela Visual
                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td><strong>${titular}</strong></td>
                        <td>${membro.nome}</td>
                        <td class="${statusGrupo === 'confirmado' ? 'status-confirmado' : statusGrupo === 'recusado' ? 'status-recusado' : 'status-pendente'}">${statusGrupo.toUpperCase()}</td>
                        <td class="${classeCor}">${statusIndividual}</td>
                        <td style="font-size: 0.85rem; color: #555;">${mensagem}</td>
                    `;
                    tbody.appendChild(tr);
                });
            });

            // Atualiza os painéis numéricos
            document.getElementById("total-convidados").innerText = contagemTotal;
            document.getElementById("total-confirmados").innerText = contagemConfirmados;
            document.getElementById("total-pendentes").innerText = contagemPendentesFamilias;
            document.getElementById("total-recusados").innerText = contagemRecusados;

        } catch (error) {
            console.error("Erro ao ler base de dados:", error);
            document.querySelector("#tabela-convidados tbody").innerHTML = "<tr><td colspan='5'>Erro ao carregar dados.</td></tr>";
        }
    }

    // Função para descarregar o ficheiro CSV (Compatível com Excel)
    document.getElementById("btn-exportar").addEventListener("click", () => {
        if(dadosExportacao.length === 0) {
            alert("A carregar os dados, aguarde um momento...");
            return;
        }

        let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // \uFEFF garante que os acentos funcionam no Excel
        csvContent += "Titular,Convidado,Status Familia,Presenca,Mensagem\n"; // Cabeçalhos

        dadosExportacao.forEach(row => {
            const linhaFormatada = row.map(campo => `"${campo}"`).join(";"); // Separado por ; para o Excel abrir direto
            csvContent += linhaFormatada + "\n";
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "lista_convidados_casamento.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    });

    // Inicia a leitura ao carregar a página
    carregarConvidados();
</script>
</body>
</html>
